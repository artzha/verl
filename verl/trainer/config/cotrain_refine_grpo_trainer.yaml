# Cotrain-refine GRPO trainer: shared actor generates both critique and refined motion.
# The primary actor runs an agent loop (cotrain_refine_agent) that does:
#   [critique gen (trainable)] + [motion_refine_prompt injection (masked)] + [refined motion gen (trainable)]
# The initial motion rollout and the critic user turn are still staged upstream via
# rollout_generations.before_actor so they live in the prompt (not the response).

# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.
defaults:

  # <folder_name>@<field_name>.<field_name>: <yaml_file_name>
  # actor_rollout_ref.actor: trainer/config/actor/dp_actor.yaml
  - actor@actor_rollout_ref.actor: dp_actor

  - data@data: motion_foresight

  # (Rule-based) Reward manager config.
  - reward_manager@reward_manager

  # Reference model config.
  - ref@actor_rollout_ref.ref: dp_ref

  # Rollout model config.
  - rollout@actor_rollout_ref.rollout: rollout

  # Shared rollout config for all extra rollouts (motion only here — no separate critic).
  - rollout@actor_rollout_ref.extra_rollout_rollout: rollout

  # Model config.
  - model@actor_rollout_ref.model: hf_model

  # Critic model config.
  - critic@critic: dp_critic

  # Reward model config.
  - reward_model@reward_model: dp_reward_model

  # Rollout correction config.
  - algorithm@algorithm.rollout_correction: rollout_correction

  # load the reference default config, then apply the fields in the current yaml
  # self config override anything above
  - _self_

# prompts
motion_prompt_path: 'cotnav/prompts/datagen/plan_v4/motion_prompt.txt'
motion_refine_prompt_path: 'cotnav/prompts/datagen/plan_v4/motion_refine_prompt.txt'
critic_prompt_path: 'cotnav/prompts/datagen/plan_v4/critic_prompt.txt'

actor_rollout_ref:
  hybrid_engine: true
  critic_output_format: verdict:v1
  critic_prompt_path: ${critic_prompt_path}

  external_worker:
    path: cotnav/verl_adapters/workers/hybrid_motion_actor.py
    name: HybridMotionActorRolloutRefWorker

  actor:
    strategy: fsdp2
    fsdp_config:
      model_dtype: bf16
      strategy: fsdp2
      # param_dtype=bf16: forward pass in bf16 (base + LoRA all-gathered and cast to bf16)
      # reduce_dtype=fp32: gradient reduction in fp32 for numerical stability
      # output_dtype=fp32: sharded gradient cast to fp32 before assignment to fp32 LoRA master weights
      # LoRA A/B params remain fp32 (PEFT default); optimizer states remain fp32
      mixed_precision:
        param_dtype: fp32
        output_dtype: fp32
        reduce_dtype: fp32
        buffer_dtype: fp32

    freeze_vision_tower: False

  # Ref policy: forward-only, no gradients — bf16 throughout, no output_dtype needed
  ref:
    strategy: fsdp2
    fsdp_config:
      model_dtype: bf16
      strategy: fsdp2
      mixed_precision:
        param_dtype: bf16
        output_dtype: bf16
        reduce_dtype: fp32
        buffer_dtype: fp32

    freeze_vision_tower: False

  model:
    # Preloads model weights to /dev/shm to improve model loading speed
    # Do not use is RAM is limited (causes OOM)
    use_shm: False

    # Whether to use custom fused kernels (PostProcessing, for memory efficiency)
    use_fused_kernels: False

    trust_remote_code: False

    # Whether to remove padding tokens in inputs during training
    use_remove_padding: True

    # LoRA knobs (VeRL infra) See model/hf_model.yaml for definitions
    lora_rank: 0.0
    lora_alpha: 0.0
    target_modules: all-linear
    exclude_modules: null


  rollout:
    name: vllm
    mode: async
    # Return rollout_log_probs during generation so bypass_mode can skip expensive old_log_prob recompute.
    calculate_log_probs: true
    temperature: 1.0
    top_p: 0.95
    prompt_length: 1680
    # Budget covers critique (~256 tok) + refine prompt injection (~120 tok) + refined motion (~192 tok).
    response_length: 768
    # Per-turn response length caps for the two shared-actor generations.
    critique_response_length: 256
    motion_response_length: 192
    # Must be null for cotrain_refine: the agent loop builds motion_response/critic_response
    # in extra_fields directly. Setting "motion" here would append the full combined response
    # (critique + refine_prompt + motion) to motion_response and corrupt RM scoring.
    response_role: null

    engine_kwargs:
      vllm:
        max_model_len: 2560
        max_num_seqs: 64
        max_num_batched_tokens: 8192
        gpu_memory_utilization: 0.9

    # Required: Allows vllm to load base model
    load_format: safetensors

    # Agent loop drives two shared-actor generations with one injected user turn between them.
    agent:
      # Route all samples to the cotrain-refine loop unless `agent_name` is set per-sample.
      default_agent_loop: cotrain_refine_agent
      # Points to the hydra registry entry that instantiates CotrainRefineAgentLoop.
      agent_loop_config_path: cotnav/verl_adapters/agent_loops/agent_loop_config.yaml

  # Which extra rollouts to run before and after the actor rollout.
  # Only one before_actor step is needed: stage initial motion + annotated critic turn as prompt context.
  # The shared-actor agent loop then handles critique + refined motion (both trainable).
  rollout_generations:
    before_actor:
      - rollout: motion
        postfill: critic

  # Shared rollout config for all extra rollouts (replaces deprecated motion_rollout).
  extra_rollout_rollout:
    name: vllm
    mode: async

    # Sampling parameters
    temperature: 1.0
    top_p: 0.95
    prompt_length: 1680
    response_length: 256

    tensor_model_parallel_size: 2
    enable_chunked_prefill: true
    enable_prefix_caching: true

    engine_kwargs:
      vllm:
        max_model_len: 2048
        max_num_seqs: 64
        gpu_memory_utilization: 0.9
        dtype: bfloat16
        max_num_batched_tokens: 8192
        swap_space: 0

  # Per-rollout configs with distinct response_length budgets.
  # motion: shorter budget for initial trajectory waypoints.
  motion_rollout_config:
    name: vllm
    mode: async
    temperature: 1.0
    top_p: 0.95
    prompt_length: 1680
    response_length: 192
    tensor_model_parallel_size: 1
    enable_chunked_prefill: true
    enable_prefix_caching: true
    engine_kwargs:
      vllm:
        max_model_len: 2048
        max_num_seqs: 64
        gpu_memory_utilization: 0.9
        dtype: bfloat16
        max_num_batched_tokens: 8192
        swap_space: 0

  # critic: longer budget for chain-of-thought critique output.
  critic_rollout_config:
    name: vllm
    mode: async
    temperature: 1.0
    top_p: 0.95
    prompt_length: 1680
    response_length: 256
    tensor_model_parallel_size: 1
    enable_chunked_prefill: true
    enable_prefix_caching: true
    engine_kwargs:
      vllm:
        max_model_len: 2048
        max_num_seqs: 64
        gpu_memory_utilization: 0.9
        dtype: bfloat16
        max_num_batched_tokens: 8192
        swap_space: 0

  # Only the motion extra rollout is needed: the shared actor handles critic + refinement in-loop.
  # motion: sync_with_actor=true so the motion planner uses the trainable policy weights.
  extra_rollouts:
    - name: motion
      model:
        path: ${actor_rollout_ref.model.path}
        trust_remote_code: true
      rollout: ${actor_rollout_ref.motion_rollout_config}
      sync_with_actor: true
      prompt_paths:
        critic: ${critic_prompt_path}
        motion: ${motion_refine_prompt_path}

reward_model:
  enable: true
  use_reward_loop: false
  strategy: fsdp2
  external_worker:
    path: cotnav/verl_adapters/workers/qwen3vl_reward_worker.py
    name: Qwen3VLMotionRewardWorker
  model:
    path: null
    external_lib: verl.models.transformers.qwen3_vl_reward
    trust_remote_code: true
    use_remove_padding: true
    apply_chat_template_kwargs: {
      do_sample_frames: false,
      video_metadata: {
        fps: 0.5,
        frames_indices: [0, 1, 2, 3],
        total_num_frames: 4
      }
    }
  use_dynamic_bsz: true

  # Per-segment format penalty weights applied on top of learned RM scores in
  # _apply_cotrain_format_penalty (ray_trainer.py). Set to 0.0 to disable.
  # Kept under a separate key so load_reward_manager does not forward these to
  # the NaiveRewardManager constructor via **reward_kwargs.
  format_penalty:
    critic_format_penalty: 0.5
    motion_format_penalty: 0.5

  # Reward type controlling how the RM scalar is computed from motion_response history.
  #   absolute -> score only the final refined motion (motion_response[-1])
  #   relative -> score refined minus initial: r_T - r_0 (motion_response[-1] - motion_response[0])
  # Kept under reward_model (not reward_kwargs) so it is not forwarded to the reward manager constructor.
  reward_type: relative

reward_manager:
  name: naive

# custom reward function definition
custom_reward_function:

  # The path to the file containing your customized reward function.
  # If not specified, pre-implemented reward functions will be used.
  path: null

  # The name of the reward function within the specified file. Default is 'compute_score'.
  name: null

# config for the algorithm
algorithm:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.trainer.config.AlgoConfig

  # Discount factor for future rewards
  gamma: 1.0

  # Trade-off between bias and variance in the GAE estimator
  lam: 1.0

  # Rollout correction: bypass_mode uses rollout_log_probs as old_log_probs (skips ~425s actor forward).
  rollout_correction:
    bypass_mode: true

  # Advantage estimator type: "gae", "grpo", "reinforce_plus_plus", etc.
  adv_estimator: grpo

  # Whether to normalize advantages by std (specific to GRPO)
  norm_adv_by_std_in_grpo: True

  # Whether to use process-level GRPO (token-level credit assignment)
  use_process_credit: False

  # Whether to enable in-reward KL penalty
  use_kl_in_reward: False

  # How to estimate KL divergence: "kl", "abs", "mse", "low_var_kl", or "full"
  kl_penalty: kl

  # KL control configuration
  kl_ctrl:

    # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
    _target_: verl.trainer.config.KLControlConfig

    # KL control type: "fixed" or "adaptive"
    type: fixed

    # Initial coefficient for KL penalty
    kl_coef: 0.001

    # Horizon value for adaptive controller (if enabled)
    horizon: 10000

    # Target KL divergence (used for adaptive controller)
    target_kl: 0.1

  # Whether to enable preference feedback PPO
  use_pf_ppo: False

  # Preference feedback PPO settings
  pf_ppo:

    # Method for reweighting samples: "pow", "max_min", or "max_random"
    reweight_method: pow

    # Power used for weight scaling in "pow" method
    weight_pow: 2.0

trainer:
  # Whether to balance batch sizes across distributed workers
  balance_batch: True
  # Number of epochs in training
  total_epochs: 30
  # Total training steps (can be set explicitly or derived from epochs)
  total_training_steps: null
  # Project name for experiment tracking (e.g., wandb)
  project_name: autorefine-critic
  # Experiment name for run identification in tracking tools
  experiment_name: qwen3_vl_2b_fsdp_${reward_model.reward_type}
  # Logging backends to use: "console", "wandb", etc.
  logger: ["console", "wandb"]
  # Number of generations to log during validation
  log_val_generations: 0
  # Directory for logging rollout data; no dump if null
  rollout_data_dir: null
  # Directory for logging validation data; no dump if null
  validation_data_dir: null
  # Number of nodes used in the training
  nnodes: 1
  # Number of GPUs per node
  n_gpus_per_node: 4
  # Save frequency (by iteration) for model checkpoints
  save_freq: -1
  # ESI refers to the elastic server instance used during training, similar to the training plan. For example,
  # if you purchase 10 hours of computing power, the ESI will automatically shut down after 10 hours of training.
  # To ensure a checkpoint is saved before ESI shuts down, the system will start saving a checkpoint in advance.
  # The advance time is calculated as: Advance Time = Longest historical step duration + Checkpoint save duration + esi_redundant_time.
  # Here, esi_redundant_time is a user-defined value that further extends the advance time for added safety.
  esi_redundant_time: 0
  # Resume mode: "auto", "disable", or "resume_path"
  # "auto": resume from last checkpoint if available
  # "disable": start from scratch
  # "resume_path": resume from a user-defined path
  resume_mode: auto
  # Path to resume training from (only used when resume_mode is "resume_path")
  resume_from_path: null
  # Whether to run validation before training begins
  val_before_train: True
  # Whether to run validation only
  val_only: False
  # Validation frequency (in training iterations)
  test_freq: -1
  # Number of iterations to warm up the critic before updating policy
  critic_warmup: 0
  # Default path to distributed filesystem for saving checkpoints
  default_hdfs_dir: null
  # Whether to delete local checkpoints after loading
  del_local_ckpt_after_load: False
  # Default local directory for saving checkpoints
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  # Maximum number of actor checkpoints to keep
  max_actor_ckpt_to_keep: null

  # Maximum number of critic checkpoints to keep
  max_critic_ckpt_to_keep: null

  # Timeout (in seconds) for Ray worker to wait for registration
  ray_wait_register_center_timeout: 300

  # Device to run training on (e.g., "cuda", "cpu")
  device: cuda

  # whether to use legacy worker implementation
  #  mode: "auto", "enable", or "disable"
  use_legacy_worker_impl: disable

# profiler configs
global_profiler:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.utils.profiler.ProfilerConfig

  # Profiling tool: choose between nsys, npu, torch, torch_memory
  tool: nsys

  # profile steps
  steps: [2, 3]

  # Whether to combine continuous steps into one database.
  ## If True, worker.profiler.discrete must be False, [1,2] in one, [5] in another.
  ## If False, [1] in one, [2] in another, [5] in another.
  profile_continuous_steps: False

  # Path to save profiling contents
  save_path: "outputs/profile"

  # Specific tool configs, can use +profiler.tool_config.[tool].xxx to config
  global_tool_config:

    # nsys config
    nsys:

      # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
      _target_: verl.utils.profiler.config.NsightToolConfig

      # True for each task has its own database, False for all tasks in one training step share one database.
      discrete: False

      # controller Nvidia Nsight Systems Options. Must set when profile_steps is not None.
      ## reference https://docs.nvidia.com/nsight-systems/UserGuide/index.html
      ## reference https://docs.ray.io/en/latest/ray-observability/user-guides/profiling.html
      controller_nsight_options:

        # Select the API(s) to be traced.
        trace: "cuda,nvtx,cublas,ucx"

        # Track the GPU memory usage by CUDA kernels. Must be string type "true" or "false".
        cuda-memory-usage: "true"

        # CUDA graphs will be traced as a whole
        cuda-graph-trace: "graph"

      # worker Nvidia Nsight Systems Options. Must set when profile_steps is not None.
      worker_nsight_options:

        # Select the API(s) to be traced.
        trace: "cuda,nvtx,cublas,ucx"

        # Track the GPU memory usage by CUDA kernels. Must be string type "true" or "false".
        cuda-memory-usage: "true"

        # CUDA graphs will be traced as a whole
        cuda-graph-trace: "graph"

        # Profiling only in a range of torch.cuda.profiler.start and stop. Do not change this config.
        capture-range: "cudaProfilerApi"

        # Specify the desired behavior when a capture range ends.
        # In verl we need the torch.cuda.profiler.start/stop pair to repeats n times.
        # valid values are "repeat-shutdown:n" or null.
        # For normal whole step profiling, n = len(profile_steps);
        # but for discrete profiling, n = len(profile_steps) * Number(subtasks).
        # Or you can just leave it null and the program will use n = len(profile_steps) * 6;
        capture-range-end: null

        # Send signal to the target application's process group. We let the program to exit by itself.
        kill: none

    # enable memory visualization for debugging memory usage
    torch_memory:

      #  Maximum number of allocation entries to record
      trace_alloc_max_entries: 100_000

      # The depth of the call stack to capture for each allocation
      stack_depth: 32

      # 'alloc': records only allocation events || 'state': records memory state changes || 'all': records both.
      context: "all"

      # 'python': records Python stacks || 'cpp': records C++ stacks (available in some versions) || 'all': records both.
      stacks: "all"

      # devices, record_context etc.
      kw_args: {}

# configs for TransferQueue
transfer_queue:

  # Whether to enable transfer queue
  enable: False

# configs related to ray
ray_kwargs:

  # configs related to ray initialization
  ray_init:
    num_cpus: 32 # Number of CPUs for Ray. Use a fixed number instead of null when using SLURM.
    include_dashboard: True
    dashboard_host: 127.0.0.1
    dashboard_port: 8265

  # Path to save Ray timeline JSON for performance profiling
  timeline_json_file: null
