# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# <folder_name>@<field_name>.<field_name>: <yaml_file_name>

defaults:
  - model@model: hf_model
  - engine@engine: fsdp
  - optim@optim: fsdp
  - profiler@profiler: profiler
  - _self_

# Run training (SFT trainer + custom RM dataset):
# python -m verl.trainer.sft_trainer --config-path "$(pwd)/external/verl/verl/trainer" --config-name motion_reward_trainer
#
# Run dataset smoke test only:
# python -m verl.utils.dataset.rm_dataset --config external/verl/verl/trainer/motion_reward_trainer.yaml --parquet data/unified_motion_rm_v1/parquet/train/train.parquet --model-path Qwen/Qwen3-VL-2B-Instruct

data:
  train_batch_size: 256 # global batch size
  micro_batch_size_per_gpu: 4  # this is also val batch size
  dataloader_num_workers: 8
  pin_memory: False # for some reason this raises an iterable error
  max_token_len_per_gpu: 8192
  use_dynamic_bsz: True
  train_files: ''
  val_files: ''
  train_max_samples: -1  # set to -1 to use full dataset
  val_max_samples: -1  # set to -1 to use full dataset
  # RM dataset keys
  prompt_key: prompt
  chosen_key: chosen
  rejected_key: rejected
  image_key: image
  video_key: video
  pad_mode: no_padding

  # Vision resize mode for image/video processing.
  # - auto: use qwen_vl_utils default smart resize
  # - original: preserve original image/frame resolution
  resize_mode: original

  # Reserved fields for future fixed-size resize mode support.
  resize_height: null
  resize_width: null

  # for right padding
  max_length: 2048
  truncation: error
  balance_dp_token: False # to be implement
  custom_cls:
    path: external/verl/verl/utils/dataset/rm_dataset.py
    name: RMDataset
  use_shm: False
  apply_chat_template_kwargs: {
    video_metadata: {
      fps: 0.5,
      frames_indices: [0, 1, 2, 3], # Frames to use
      total_num_frames: 4           # Observation history
    }
  }

model:
  path: Qwen/Qwen3-VL-2B-Instruct
  tokenizer_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: True
  lora_rank: 32
  lora_alpha: 32
  target_modules: 'all-linear'
    # - linear_fc1
    # - linear_fc2
    # - q_proj
    # - v_proj
    # - k_proj

  # Exclude the reward head from LoRA so it trains with full gradients.
  # The score head is newly initialised and small (hidden_size -> 1),
  # so full-rank updates are both cheap and more expressive than low-rank.
  exclude_modules: ".*\\.score$"
  # exclude_modules: ".*visual\\.blocks\\..*|.*visual\\.patch_embed\\..*|.*visual\\.pos_embed$|.*visual\\.rotary_pos_emb$"

# Checkpoint configuration
checkpoint:
  _target_: verl.trainer.config.CheckpointConfig
  # What to include in saved checkpoints
  # with 'hf_model' you can save whole model as hf format, now only use sharded model checkpoint to save space
  save_contents: ["model", "optimizer", "extra"]

  # For more flexibility, you can specify the contents to load from the checkpoint.
  load_contents: ${checkpoint.save_contents}

trainer:
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  default_hdfs_dir: null
  project_name: motion-reward
  experiment_name: qwen3vl2b-rm
  total_epochs: 15
  total_training_steps: null
  logger: [ 'console', 'wandb' ]
  seed: 1
  save_freq: -1
  test_freq: -1
  # Number of validation checks with no improvement before stopping.
  early_stop_patience: 0
  # Minimum improvement on early_stop_metric to reset early stopping patience.
  early_stop_min_delta: 0.0
  # Validation metric used for early stopping.
  early_stop_metric: val/loss
  # Direction for early stopping metric: "max" (higher is better) or "min".
  early_stop_mode: min
  max_ckpt_to_keep: null  # Maximum number of checkpoints to keep, set to null to keep all

  # Resume mode: "auto", "disable", or "resume_path"
  # "auto": resume from last checkpoint if available
  # "disable": start from scratch
  # "resume_path": resume from a user-defined path
  resume_mode: auto

  # Path to resume training from (used when resume_mode is "resume_path" or "auto")
  resume_from_path: null  
  device: cuda

  nnodes: 1
  n_gpus_per_node: 1

  profile_interval: [-1, -1]

  # Freeze LoRA adapters for this many steps so the randomly-initialised score
  # head can stabilise before the backbone adapts. Set to 0 to disable.
  score_head_warmup_steps: 0

optim:
  lr_scheduler_type: cosine
  lr_warmup_steps_ratio: 0.05
